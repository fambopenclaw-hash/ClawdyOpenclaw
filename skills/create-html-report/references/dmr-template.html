<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMR Report</title>
  <style>
    :root {
      --dark: #0f1b2d; --blue: #0032A0; --light: #e8edf5;
      --mid: #c5d0e6; --green: #1a7a4a; --amber: #d4820a;
      --red: #c0392b; --text: #1a1a2e; --muted: #5a6a7a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Calibri, sans-serif; background: var(--light); color: var(--text); font-size: 14px; }

    /* Header */
    .header {
      background: var(--dark);
      background-image: linear-gradient(135deg, #0f1b2d 0%, #1a2f4e 100%);
      color: #fff; padding: 28px 36px 24px;
      border-bottom: 4px solid var(--blue);
    }
    .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
    .badge { background: var(--blue); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header-meta { font-size: 12px; color: var(--mid); margin-top: 4px; }

    /* Body */
    .body { padding: 28px 36px 48px; max-width: 1100px; }

    /* Cards grid */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-top: 4px solid var(--blue); }
    .stat-card.green { border-top-color: var(--green); }
    .stat-card.amber { border-top-color: var(--amber); }
    .stat-card.red   { border-top-color: var(--red); }
    .stat-card.muted { border-top-color: var(--muted); }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--dark); }
    .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Sections */
    .section { background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--mid); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--dark); color: #fff; padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    td { padding: 8px 12px; border-bottom: 1px solid var(--light); vertical-align: top; }
    tr:nth-child(even) td { background: #f4f7fc; }
    tr:last-child td { border-bottom: none; }

    /* Text helpers */
    .text-green { color: var(--green); font-weight: 700; }
    .text-amber { color: var(--amber); font-weight: 700; }
    .text-red   { color: var(--red); font-weight: 700; }
    .text-muted { color: var(--muted); }
    .text-blue  { color: var(--blue); font-weight: 700; }

    /* Block text */
    .block-text { background: #f4f7fc; border-left: 4px solid var(--blue); padding: 12px 16px; border-radius: 4px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }

    /* Two-col layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .header { padding: 20px 20px 16px; } .body { padding: 20px 20px 36px; } .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<div class="header">
  <div style="margin-bottom:10px">
    <a href="index.html" style="color:#fff;font-size:12px;font-weight:700;text-decoration:none;background:var(--blue);padding:5px 12px;border-radius:6px;">← Back to Index</a>
  </div>
  <div class="header-top">
    <span class="badge">DMR</span>
    <h1><!-- REPORT TITLE --></h1>
  </div>
  <div class="header-meta"><!-- REPORT SUBTITLE / DATE --></div>
</div>

<div class="body">

  <!-- Key Stats Row -->
  <div class="stat-grid" id="stats"><!-- Filled by script --></div>

  <!-- General Data -->
  <div class="section">
    <div class="section-title">General Data</div>
    <table id="general-table"><!-- Filled by script --></table>
  </div>

  <!-- Daily Summary -->
  <div class="section">
    <div class="section-title">Daily Summary</div>
    <div class="block-text" id="daily-summary"><!-- --></div>
  </div>

  <!-- 24-Hr Look Ahead -->
  <div class="section">
    <div class="section-title">24-Hour Look Ahead</div>
    <div class="block-text" id="look-ahead"><!-- --></div>
  </div>

  <!-- Two-col: HSE + NPT -->
  <div class="two-col">
    <div class="section">
      <div class="section-title">HSE Data</div>
      <table id="hse-table"><!-- --></table>
    </div>
    <div class="section">
      <div class="section-title">NPT Summary</div>
      <table id="npt-table"><!-- --></table>
    </div>
  </div>

  <!-- Time Breakdown -->
  <div class="section">
    <div class="section-title">Time Breakdown</div>
    <table id="time-table"><!-- --></table>
  </div>

  <!-- Additional Sections (BHA, Mud, etc.) -->
  <div id="extra-sections"><!-- Filled as available --></div>

  <!-- ── Footer ── -->
  <div style="text-align:center;padding:20px 36px;font-size:12px;color:var(--muted);border-top:1px solid var(--mid);margin-top:8px">
    <!-- REPORT FOOTER INFO -->&nbsp;|&nbsp; Generated by OpenClaw
  </div>

</div>
</body>
</html>
